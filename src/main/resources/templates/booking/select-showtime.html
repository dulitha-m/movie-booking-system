<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>Select Showtime - Book My Show</title>
</head>
<body>
    <div th:fragment="content">
        <div class="container mt-4">
            <!-- Movie Header -->
            <div class="row mb-4">
                <div class="col-md-3">
                    <img th:src="${movie.posterUrl}" class="img-fluid rounded shadow" alt="Movie Poster" style="max-width: 200px;">
                </div>
                <div class="col-md-9">
                    <h1 class="display-5 fw-bold" th:text="${movie.title}">Movie Title</h1>
                    <p class="lead text-muted" th:text="${movie.description}">Movie Description</p>
                    <div class="row">
                        <div class="col-md-6">
                            <p><strong>Genre:</strong> <span class="badge bg-secondary" th:text="${movie.genre.displayName}">Action</span></p>
                            <p><strong>Duration:</strong> <span th:text="${movie.durationMinutes}">120</span> minutes</p>
                        </div>
                        <div class="col-md-6">
                            <p><strong>Rating:</strong> <span class="badge bg-warning text-dark" th:text="${movie.rating}">8.5</span></p>
                            <p><strong>Director:</strong> <span th:text="${movie.director}">Director Name</span></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Showtime Selection -->
            <div class="row">
                <div class="col-12">
                    <h2 class="mb-4 fw-bold">
                        <i class="fas fa-clock me-2"></i>Select Showtime
                    </h2>
                    
                    <div th:if="${showtimes.isEmpty()}" class="alert alert-info">
                        <i class="fas fa-info-circle me-2"></i>No showtimes available for this movie.
                    </div>
                    
                    <div th:if="${!showtimes.isEmpty()}" class="row">
                        <div class="col-md-6 col-lg-4 mb-3" th:each="showtime : ${showtimes}">
                            <div class="card h-100 shadow-sm showtime-card">
                                <div class="card-body text-center">
                                    <h5 class="card-title fw-bold" th:text="${showtime.theater.name}">Theater Name</h5>
                                    <p class="card-text">
                                        <i class="fas fa-calendar-alt me-2"></i>
                                        <span th:text="${#temporals.format(showtime.showDateTime, 'dd MMM yyyy')}">01 Jan 2024</span>
                                    </p>
                                    <p class="card-text">
                                        <i class="fas fa-clock me-2"></i>
                                        <span th:text="${#temporals.format(showtime.showDateTime, 'HH:mm')}">19:00</span>
                                    </p>
                                    <p class="card-text">
                                        <i class="fas fa-tv me-2"></i>
                                        Screen <span th:text="${showtime.screenNumber}">1</span>
                                    </p>
                                    <p class="card-text">
                                        <i class="fas fa-chair me-2"></i>
                                        <span th:text="${showtime.availableSeats}">100</span> seats available
                                    </p>
                                    <div class="mt-3">
                                        <h4 class="text-primary fw-bold" th:text="'Rs. ' + ${#numbers.formatDecimal(showtime.ticketPrice, 0, 0)}">Rs. 1,200</h4>
                                    </div>
                                    <div class="mt-3">
                                        <a th:href="@{/booking/select-seats/{id}(id=${showtime.id})}" 
                                           class="btn btn-primary btn-lg w-100">
                                            <i class="fas fa-ticket-alt me-2"></i>Select Seats
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Back Button -->
            <div class="row mt-4">
                <div class="col-12 text-center">
                    <a href="/movies" class="btn btn-outline-secondary btn-lg">
                        <i class="fas fa-arrow-left me-2"></i>Back to Movies
                    </a>
                </div>
            </div>
        </div>

        <style>
            .showtime-card {
                transition: transform 0.2s ease-in-out;
                border: 2px solid transparent;
            }
            
            .showtime-card:hover {
                transform: translateY(-5px);
                border-color: #0d6efd;
                box-shadow: 0 8px 25px rgba(0,0,0,0.15) !important;
            }
            
            .showtime-card .card-body {
                padding: 1.5rem;
            }
        </style>
    </div>
</body>
</html>
