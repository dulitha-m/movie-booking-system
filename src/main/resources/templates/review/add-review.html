<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>Add Review - Book My Show</title>
</head>
<body>
    <div th:fragment="content">
        <div class="container mt-4">
            <!-- Movie Header -->
            <div class="row mb-4">
                <div class="col-md-3">
                    <img th:src="${movie.posterUrl}" class="img-fluid rounded shadow" alt="Movie Poster" style="max-width: 200px;">
                </div>
                <div class="col-md-9">
                    <h1 class="display-5 fw-bold" th:text="${movie.title}">Movie Title</h1>
                    <p class="lead text-muted" th:text="${movie.description}">Movie Description</p>
                    <div class="row">
                        <div class="col-md-6">
                            <p><strong>Genre:</strong> <span class="badge bg-secondary" th:text="${movie.genre.displayName}">Action</span></p>
                            <p><strong>Duration:</strong> <span th:text="${movie.durationMinutes}">120</span> minutes</p>
                        </div>
                        <div class="col-md-6">
                            <p><strong>Director:</strong> <span th:text="${movie.director}">Director Name</span></p>
                            <p><strong>Release Date:</strong> <span th:text="${movie.releaseDate}">2024-01-01</span></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Review Form -->
            <div class="row">
                <div class="col-md-8 mx-auto">
                    <div class="card shadow">
                        <div class="card-header bg-primary text-white">
                            <h3 class="mb-0">
                                <i class="fas fa-star me-2"></i>Write Your Review
                            </h3>
                        </div>
                        <div class="card-body p-4">
                            <form th:action="@{/review/add/{movieId}(movieId=${movie.id})}" th:object="${review}" method="post">
                                <!-- Rating -->
                                <div class="mb-4">
                                    <label class="form-label fw-bold">Your Rating</label>
                                    <div class="rating-input">
                                        <div class="star-rating">
                                            <input type="radio" id="star5" name="rating" value="5" th:field="*{rating}">
                                            <label for="star5" class="star">★</label>
                                            <input type="radio" id="star4" name="rating" value="4" th:field="*{rating}">
                                            <label for="star4" class="star">★</label>
                                            <input type="radio" id="star3" name="rating" value="3" th:field="*{rating}">
                                            <label for="star3" class="star">★</label>
                                            <input type="radio" id="star2" name="rating" value="2" th:field="*{rating}">
                                            <label for="star2" class="star">★</label>
                                            <input type="radio" id="star1" name="rating" value="1" th:field="*{rating}">
                                            <label for="star1" class="star">★</label>
                                        </div>
                                    </div>
                                </div>

                                <!-- Comment -->
                                <div class="mb-4">
                                    <label for="comment" class="form-label fw-bold">Your Review</label>
                                    <textarea class="form-control" id="comment" th:field="*{comment}" rows="6" 
                                              placeholder="Share your thoughts about this movie..." required></textarea>
                                </div>

                                <!-- Submit Buttons -->
                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-primary btn-lg">
                                        <i class="fas fa-paper-plane me-2"></i>Submit Review
                                    </button>
                                    <a th:href="@{/movies/{id}(id=${movie.id})}" class="btn btn-outline-secondary btn-lg">
                                        <i class="fas fa-arrow-left me-2"></i>Back to Movie
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <style>
            .rating-input {
                margin-bottom: 1rem;
            }
            
            .star-rating {
                display: flex;
                flex-direction: row-reverse;
                justify-content: flex-end;
                gap: 5px;
            }
            
            .star-rating input[type="radio"] {
                display: none;
            }
            
            .star-rating label {
                font-size: 2rem;
                color: #ddd;
                cursor: pointer;
                transition: color 0.2s;
            }
            
            .star-rating label:hover,
            .star-rating label:hover ~ label,
            .star-rating input[type="radio"]:checked ~ label {
                color: #ffc107;
            }
            
            .star-rating input[type="radio"]:checked + label {
                color: #ffc107;
            }
        </style>
    </div>
</body>
</html>
