<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>My Reviews - Book My Show</title>
</head>
<body>
    <div th:fragment="content">
        <div class="container mt-4">
            <!-- Page Header -->
            <div class="row mb-4">
                <div class="col-12">
                    <h1 class="display-5 fw-bold text-center">
                        <i class="fas fa-star me-2 text-warning"></i>My Reviews
                    </h1>
                    <p class="lead text-center text-muted">Manage your movie reviews and ratings</p>
                </div>
            </div>

            <!-- Reviews List -->
            <div class="row" th:if="${reviews != null and !reviews.isEmpty()}">
                <div class="col-12">
                    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
                        <div class="col" th:each="review : ${reviews}">
                            <div class="card h-100 shadow-sm">
                                <div class="card-header bg-light">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <h5 class="mb-0" th:text="${review.movie.title}">Movie Title</h5>
                                        <div class="rating-display">
                                            <span th:each="i : ${#numbers.sequence(1, T(java.lang.Math).min(5, review.rating))}" class="text-warning">★</span>
                                            <span th:each="i : ${#numbers.sequence(T(java.lang.Math).min(5, review.rating) + 1, 5)}" class="text-muted">★</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="card-body d-flex flex-column">
                                    <p class="card-text flex-grow-1" th:text="${review.comment}">Review comment...</p>
                                    <div class="mt-auto">
                                        <small class="text-muted">
                                            <i class="fas fa-calendar me-1"></i>
                                            <span th:text="${#temporals.format(review.createdAt, 'MMM dd, yyyy')}">Jan 01, 2024</span>
                                        </small>
                                    </div>
                                </div>
                                <div class="card-footer bg-transparent">
                                    <div class="d-flex gap-2">
                                        <a th:href="@{/review/edit/{id}(id=${review.id})}" class="btn btn-sm btn-outline-warning">
                                            <i class="fas fa-edit me-1"></i>Edit
                                        </a>
                                        <form th:action="@{/review/delete/{id}(id=${review.id})}" method="post" class="d-inline">
                                            <button type="submit" class="btn btn-sm btn-outline-danger" 
                                                    onclick="return confirm('Are you sure you want to delete this review?')">
                                                <i class="fas fa-trash me-1"></i>Delete
                                            </button>
                                        </form>
                                        <a th:href="@{/movies/{id}(id=${review.movie.id})}" class="btn btn-sm btn-outline-primary">
                                            <i class="fas fa-eye me-1"></i>View Movie
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- No Reviews Message -->
            <div class="row" th:if="${reviews == null or reviews.isEmpty()}">
                <div class="col-12">
                    <div class="text-center py-5">
                        <i class="fas fa-star fa-4x text-muted mb-3"></i>
                        <h3 class="text-muted">No Reviews Yet</h3>
                        <p class="text-muted">You haven't written any reviews yet. Start reviewing movies to see them here!</p>
                        <a href="/movies" class="btn btn-primary btn-lg">
                            <i class="fas fa-film me-2"></i>Browse Movies
                        </a>
                    </div>
                </div>
            </div>

            <!-- Back to Profile -->
            <div class="row mt-4">
                <div class="col-12 text-center">
                    <a href="/profile" class="btn btn-outline-secondary">
                        <i class="fas fa-user me-2"></i>Back to Profile
                    </a>
                </div>
            </div>
        </div>

        <style>
            .rating-display {
                font-size: 1.2rem;
            }
            
            .card {
                transition: transform 0.2s;
            }
            
            .card:hover {
                transform: translateY(-2px);
            }
        </style>
    </div>
</body>
</html>
