<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>Page Not Found - Book My Show</title>
</head>
<body>
    <div th:fragment="content">
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-8 text-center">
                    <div class="error-page">
                        <i class="fas fa-search fa-5x text-muted mb-4"></i>
                        <h1 class="display-1 fw-bold text-primary mb-3">404</h1>
                        <h2 class="h4 text-muted mb-4">Page Not Found</h2>
                        <p class="lead mb-4">The page you're looking for doesn't exist or has been moved.</p>
                        
                        <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                            <a href="/home" class="btn btn-primary btn-lg me-md-2">
                                <i class="fas fa-home me-2"></i>Go Home
                            </a>
                            <a href="/movies" class="btn btn-outline-primary btn-lg me-md-2">
                                <i class="fas fa-film me-2"></i>Browse Movies
                            </a>
                            <button onclick="history.back()" class="btn btn-outline-secondary btn-lg">
                                <i class="fas fa-arrow-left me-2"></i>Go Back
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
