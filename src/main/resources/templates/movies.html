<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>Movies - Book My Show</title>
</head>
<body>
    <div th:fragment="content">
        <!-- Page Header -->
        <div class="container mt-4">
            <div class="row">
                <div class="col-12">
                    <h1 class="display-5 fw-bold text-center mb-4">
                        <i class="fas fa-film me-2 text-primary"></i>Movies
                    </h1>
                </div>
            </div>
        </div>

        <!-- Search and Filter Section -->
        <div class="container mb-4">
            <div class="row">
                <div class="col-md-8">
                    <form method="get" action="/movies" class="d-flex">
                        <input type="text" name="search" class="form-control me-2" placeholder="Search movies..." th:value="${param.search}">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-search"></i>
                        </button>
                    </form>
                </div>
                <div class="col-md-4">
                    <form method="get" action="/movies" class="d-flex">
                        <select name="genre" class="form-select me-2" onchange="this.form.submit()">
                            <option value="">All Genres</option>
                            <option th:each="genre : ${genres}" 
                                    th:value="${genre}" 
                                    th:text="${genre}" 
                                    th:selected="${param.genre == genre}">
                            </option>
                        </select>
                    </form>
                </div>
            </div>
        </div>

        <!-- Movies Grid -->
        <div class="container">
            <div class="row" th:if="${movies != null and !movies.empty}">
                <div class="col-lg-3 col-md-4 col-sm-6 mb-4" th:each="movie : ${movies}">
                    <div class="card h-100 shadow-sm movie-card">
                        <div class="position-relative">
                            <img th:src="${movie.posterUrl}" 
                                 th:alt="${movie.title}" 
                                 class="card-img-top" 
                                 style="height: 400px; object-fit: cover;"
                                 onerror="this.src='https://via.placeholder.com/300x450/6c757d/ffffff?text=No+Image'">
                            <div class="position-absolute top-0 end-0 m-2">
                                <span class="badge bg-warning text-dark" th:text="${movieAverageRatings[movie.id] != null and movieAverageRatings[movie.id] > 0 ? #numbers.formatDecimal(movieAverageRatings[movie.id], 1, 1) : 'N/A'}">4.5</span>
                            </div>
                            <div class="position-absolute top-0 start-0 m-2">
                                <span class="badge bg-primary" th:text="${movie.genre}">Action</span>
                            </div>
                        </div>
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title" th:text="${movie.title}">Movie Title</h5>
                            <p class="card-text text-muted small" th:text="${#strings.abbreviate(movie.description, 100)}">Movie description...</p>
                            <div class="mt-auto">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <small class="text-muted">
                                        <i class="fas fa-clock me-1"></i>
                                        <span th:text="${movie.durationMinutes} + ' min'">120 min</span>
                                    </small>
                                    <small class="text-muted">
                                        <i class="fas fa-calendar me-1"></i>
                                        <span th:text="${#temporals.format(movie.releaseDate, 'yyyy')}">2024</span>
                                    </small>
                                </div>
                                <div class="d-flex gap-2">
                                    <a th:href="@{/movies/{id}(id=${movie.id})}" class="btn btn-outline-primary btn-sm flex-fill">
                                        <i class="fas fa-info-circle me-1"></i>Details
                                    </a>
                                    <a th:href="@{/review/movie/{id}(id=${movie.id})}" class="btn btn-outline-success btn-sm flex-fill">
                                        <i class="fas fa-star me-1"></i>Reviews
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- No Movies Found -->
            <div class="text-center py-5" th:if="${movies == null or movies.empty}">
                <i class="fas fa-film fa-3x text-muted mb-3"></i>
                <h3 class="text-muted">No Movies Found</h3>
                <p class="text-muted">Try adjusting your search criteria or check back later for new releases.</p>
                <a href="/movies" class="btn btn-primary">
                    <i class="fas fa-refresh me-2"></i>View All Movies
                </a>
            </div>
        </div>

        <!-- Pagination (if needed) -->
        <div class="container mt-5">
            <nav aria-label="Movies pagination">
                <ul class="pagination justify-content-center">
                    <!-- Pagination will be implemented if needed -->
                </ul>
            </nav>
        </div>
    </div>

    <style>
        .movie-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15) !important;
        }
        
        .movie-card .card-img-top {
            transition: transform 0.3s ease;
        }
        
        .movie-card:hover .card-img-top {
            transform: scale(1.05);
        }
    </style>
</body>
</html>
