<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Seats - Book My Show</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <style>
        .seat-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 30px;
            background-color: #f8f9fa;
            border-radius: 12px;
            margin: 20px 0;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .screen-label {
            background-color: #343a40;
            color: white;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .seat-section {
            width: 100%;
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #495057;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .dir-lounge {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
        }
        
        .dir-lounge-left, .dir-lounge-right {
            display: flex;
            gap: 8px;
        }
        
        .standard-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .seat-row {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }
        
        .seat-row-label {
            width: 25px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            color: #495057;
        }
        
        .seat {
            width: 35px;
            height: 35px;
            border: 2px solid #28a745;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: #28a745;
            color: white;
        }
        
        .seat:hover {
            transform: scale(1.1);
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.5);
        }
        
        .seat.selected {
            background-color: #007bff !important;
            border-color: #0056b3 !important;
            color: white !important;
        }
        
        .seat.occupied {
            background-color: #dc3545;
            border-color: #a71e2a;
            color: white;
            cursor: not-allowed;
        }
        
        .seat-legend {
            display: flex;
            gap: 30px;
            margin-top: 30px;
            justify-content: center;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        
        .legend-seat {
            width: 25px;
            height: 25px;
            border-radius: 4px;
            border: 2px solid;
        }
        
        .legend-seat.selected {
            background-color: #007bff;
            border-color: #0056b3;
        }
        
        .legend-seat.available {
            background-color: #28a745;
            border-color: #28a745;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-film me-2"></i>Book My Show
            </a>
            
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/admin/dashboard">
                    <i class="fas fa-tachometer-alt me-1"></i>Admin Dashboard
                </a>
                <a class="nav-link" href="/logout">
                    <i class="fas fa-sign-out-alt me-1"></i>Logout
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h4 class="mb-0">
                            <i class="fas fa-chair me-2"></i>Select Your Seats
                        </h4>
                    </div>
                    <div class="card-body">
                        <!-- Error/Success Messages -->
                        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="fas fa-exclamation-triangle me-2"></i>
                            <span th:text="${error}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                            <i class="fas fa-check-circle me-2"></i>
                            <span th:text="${success}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                        
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <strong>Theater:</strong> <span th:text="${booking.showtime.theater.name}"></span>
                            </div>
                            <div class="col-md-6">
                                <strong>Screen:</strong> <span th:text="${booking.showtime.screenNumber}"></span>
                            </div>
                        </div>
                        
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <strong>Movie:</strong> <span th:text="${booking.showtime.movie.title}"></span>
                            </div>
                            <div class="col-md-6">
                                <strong>Showtime:</strong> <span th:text="${#temporals.format(booking.showtime.showDateTime, 'yyyy-MM-dd HH:mm')}"></span>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label"><strong>Current Seats:</strong></label>
                            <div class="text-muted" th:text="${booking.selectedSeats} ?: 'No seats selected'"></div>
                        </div>
                        
                        <form th:action="@{'/admin/bookings/' + ${booking.id} + '/update-seats'}" method="post" onsubmit="return validateSeatSelection()">
                            <div class="mb-3">
                                <label class="form-label"><strong>Select New Seats:</strong></label>
                                <div id="seatLayout" class="seat-layout">
                                    <!-- Seat layout will be generated dynamically -->
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label"><strong>Selected Seats:</strong></label>
                                <div id="selectedSeatsDisplay" class="text-primary fw-bold">No seats selected</div>
                                <input type="hidden" id="selectedSeats" name="selectedSeats" value="">
                            </div>
                            
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-edit me-1"></i>Edit Seats
                                </button>
                                <a th:href="@{'/admin/movies/' + ${booking.showtime.movie.id} + '/analytics'}" class="btn btn-secondary">
                                    <i class="fas fa-arrow-left me-1"></i>Back to Analytics
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let selectedSeats = [];
        let currentBookingId = null;
        
        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            console.log('=== EDIT SEATS PAGE LOADED ===');
            
            // Get booking data from Thymeleaf
            const bookingId = /*[[${booking.id}]]*/ null;
            const currentSeats = /*[[${booking.selectedSeats}]]*/ '';
            const totalSeats = /*[[${booking.showtime.totalSeats}]]*/ 50;
            
            console.log('Booking ID:', bookingId);
            console.log('Current seats:', currentSeats);
            console.log('Total seats:', totalSeats);
            
            currentBookingId = bookingId;
            selectedSeats = currentSeats ? currentSeats.split(',') : [];
            
            console.log('Initial selectedSeats array:', selectedSeats);
            
            // Generate seat layout
            generateSeatLayout(totalSeats, selectedSeats);
            
            // Update display
            updateSelectedSeatsDisplay();
            
            console.log('=== PAGE INITIALIZATION COMPLETE ===');
        });
        
        function generateSeatLayout(totalSeats, occupiedSeats) {
            console.log('Generating realistic theater seat layout for', totalSeats, 'seats');
            
            const seatLayout = document.getElementById('seatLayout');
            seatLayout.innerHTML = '';
            
            // Add screen label with icon
            const screenLabel = document.createElement('div');
            screenLabel.className = 'screen-label';
            screenLabel.innerHTML = '<i class="fas fa-tv"></i> SCREEN';
            seatLayout.appendChild(screenLabel);
            
            // DIR'S LOUNGE Section
            const dirLoungeSection = document.createElement('div');
            dirLoungeSection.className = 'seat-section';
            
            const dirLoungeTitle = document.createElement('div');
            dirLoungeTitle.className = 'section-title';
            dirLoungeTitle.textContent = 'DIR\'S LOUNGE';
            dirLoungeSection.appendChild(dirLoungeTitle);
            
            const dirLounge = document.createElement('div');
            dirLounge.className = 'dir-lounge';
            
            // Left block: DL11, DL10, DL9, DL8, DL7, DL6, DL5
            const dirLoungeLeft = document.createElement('div');
            dirLoungeLeft.className = 'dir-lounge-left';
            for (let i = 11; i >= 5; i--) {
                const seatElement = createSeatElement('DL' + i, occupiedSeats);
                dirLoungeLeft.appendChild(seatElement);
            }
            
            // Right block: DL4, DL3, DL2, DL1
            const dirLoungeRight = document.createElement('div');
            dirLoungeRight.className = 'dir-lounge-right';
            for (let i = 4; i >= 1; i--) {
                const seatElement = createSeatElement('DL' + i, occupiedSeats);
                dirLoungeRight.appendChild(seatElement);
            }
            
            dirLounge.appendChild(dirLoungeLeft);
            dirLounge.appendChild(dirLoungeRight);
            dirLoungeSection.appendChild(dirLounge);
            seatLayout.appendChild(dirLoungeSection);
            
            // STANDARD Section
            const standardSection = document.createElement('div');
            standardSection.className = 'seat-section';
            
            const standardTitle = document.createElement('div');
            standardTitle.className = 'section-title';
            standardTitle.textContent = 'STANDARD';
            standardSection.appendChild(standardTitle);
            
            const standardSeats = document.createElement('div');
            standardSeats.className = 'standard-section';
            
            // Generate standard rows (I, H, G, F, E, D, C, B, A)
            const rowLabels = ['I', 'H', 'G', 'F', 'E', 'D', 'C', 'B', 'A'];
            
            rowLabels.forEach((rowLabel, rowIndex) => {
                const seatRow = document.createElement('div');
                seatRow.className = 'seat-row';
                
                // Add row label
                const rowLabelElement = document.createElement('div');
                rowLabelElement.className = 'seat-row-label';
                rowLabelElement.textContent = rowLabel;
                seatRow.appendChild(rowLabelElement);
                
                // Determine seats per row based on the image
                let seatsPerRow, leftSeats, rightSeats;
                if (rowIndex < 3) { // Rows I, H, G - 17 seats each
                    seatsPerRow = 17;
                    leftSeats = 9; // I17-I9
                    rightSeats = 8; // I8-I1
                } else { // Rows F, E, D, C, B, A - 15 seats each
                    seatsPerRow = 15;
                    leftSeats = 7; // F15-F9
                    rightSeats = 8; // F8-F1
                }
                
                // Left block seats
                for (let seat = seatsPerRow; seat > seatsPerRow - leftSeats; seat--) {
                    const seatElement = createSeatElement(rowLabel + seat, occupiedSeats);
                    seatRow.appendChild(seatElement);
                }
                
                // Add gap (aisle)
                const aisle = document.createElement('div');
                aisle.style.width = '20px';
                seatRow.appendChild(aisle);
                
                // Right block seats
                for (let seat = seatsPerRow - leftSeats; seat >= 1; seat--) {
                    const seatElement = createSeatElement(rowLabel + seat, occupiedSeats);
                    seatRow.appendChild(seatElement);
                }
                
                standardSeats.appendChild(seatRow);
            });
            
            standardSection.appendChild(standardSeats);
            seatLayout.appendChild(standardSection);
            
            // Add legend
            const legend = document.createElement('div');
            legend.className = 'seat-legend';
            legend.innerHTML = `
                <div class="legend-item">
                    <div class="legend-seat selected"></div>
                    <span>Selected</span>
                </div>
                <div class="legend-item">
                    <div class="legend-seat available"></div>
                    <span>Available</span>
                </div>
            `;
            seatLayout.appendChild(legend);
            
            console.log('Realistic theater seat layout generated successfully');
        }
        
        function createSeatElement(seatNumber, occupiedSeats) {
            const seatElement = document.createElement('div');
            seatElement.className = 'seat';
            seatElement.textContent = seatNumber;
            seatElement.dataset.seatNumber = seatNumber;
            
            // Check if seat is currently selected
            if (occupiedSeats.includes(seatNumber)) {
                seatElement.classList.add('selected');
            }
            
            seatElement.addEventListener('click', function() {
                toggleSeatSelection(this);
            });
            
            return seatElement;
        }
        
        function toggleSeatSelection(seatElement) {
            const seatNumber = seatElement.dataset.seatNumber;
            
            if (seatElement.classList.contains('selected')) {
                // Deselect seat
                seatElement.classList.remove('selected');
                selectedSeats = selectedSeats.filter(seat => seat !== seatNumber);
                console.log('Seat deselected:', seatNumber);
            } else {
                // Select seat
                seatElement.classList.add('selected');
                selectedSeats.push(seatNumber);
                console.log('Seat selected:', seatNumber);
            }
            
            updateSelectedSeatsDisplay();
        }
        
        function updateSelectedSeatsDisplay() {
            const display = document.getElementById('selectedSeatsDisplay');
            const hiddenInput = document.getElementById('selectedSeats');
            
            if (selectedSeats.length === 0) {
                display.textContent = 'No seats selected';
                hiddenInput.value = '';
            } else {
                display.textContent = selectedSeats.join(', ');
                hiddenInput.value = selectedSeats.join(',');
            }
            
            console.log('Selected seats updated:', selectedSeats);
            console.log('Hidden input value:', hiddenInput.value);
        }
        
        function validateSeatSelection() {
            console.log('Validating seat selection...');
            console.log('Selected seats:', selectedSeats);
            
            if (selectedSeats.length === 0) {
                alert('Please select at least one seat before proceeding.');
                return false;
            }
            
            // Update the hidden input before submission
            const hiddenInput = document.getElementById('selectedSeats');
            hiddenInput.value = selectedSeats.join(',');
            
            console.log('Form validation passed. Submitting with seats:', hiddenInput.value);
            return true;
        }
    </script>
</body>
</html>
