<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>Showtime Management - Book My Show Admin</title>
</head>
<body>
    <div th:fragment="content">
        <!-- Admin Header -->
        <div class="bg-primary text-white py-4 mb-4">
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-md-8">
                        <h1 class="h2 mb-0">
                            <i class="fas fa-clock me-2"></i>Showtime Management
                        </h1>
                        <p class="mb-0">Manage movie showtimes and ticket prices</p>
                    </div>
                    <div class="col-md-4 text-md-end">
                        <button class="btn btn-light" data-bs-toggle="modal" data-bs-target="#addShowtimeModal">
                            <i class="fas fa-plus me-1"></i>Add New Showtime
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Showtimes Table -->
        <div class="container mb-5">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">
                        <i class="fas fa-list me-2"></i>All Showtimes
                    </h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th>Movie</th>
                                    <th>Theater</th>
                                    <th>Screen</th>
                                    <th>Date & Time</th>
                                    <th>Price</th>
                                    <th>Available Seats</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="showtime : ${showtimes}">
                                    <td>
                                        <strong th:text="${showtime.movie.title}">Movie Title</strong>
                                    </td>
                                    <td th:text="${showtime.theater.name}">Theater Name</td>
                                    <td th:text="${showtime.screenNumber}">1</td>
                                    <td th:text="${showtime.showDateTime}">2024-01-01 19:00</td>
                                    <td>
                                        <span class="badge bg-success" th:text="'Rs. ' + ${#numbers.formatDecimal(showtime.ticketPrice, 0, 0)}">Rs. 1,200</span>
                                    </td>
                                    <td>
                                        <span th:text="${showtime.availableSeats} + '/' + ${showtime.totalSeats}">50/100</span>
                                    </td>
                                    <td>
                                        <span class="badge" th:class="${showtime.isActive ? 'bg-success' : 'bg-secondary'}" 
                                              th:text="${showtime.isActive ? 'Active' : 'Inactive'}">Active</span>
                                    </td>
                                    <td>
                                        <div class="btn-group btn-group-sm">
                                            <a th:href="@{/admin/showtimes/{id}/edit(id=${showtime.id})}" 
                                               class="btn btn-outline-primary" 
                                               title="Edit Showtime">
                                                <i class="fas fa-edit"></i>
                                            </a>
                                            <form th:action="@{/admin/showtimes/{id}/delete(id=${showtime.id})}" 
                                                  method="post" 
                                                  style="display: inline;"
                                                  onsubmit="console.log('Form submitted for showtime ID: ' + ${showtime.id}); return confirm('Are you sure you want to delete this showtime? This action cannot be undone.');">
                                                <button type="submit" class="btn btn-outline-danger" title="Delete Showtime">
                                                    <i class="fas fa-trash"></i>
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Showtime Modal -->
        <div class="modal fade" id="addShowtimeModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">
                            <i class="fas fa-plus me-2"></i>Add New Showtime
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <form th:action="@{/admin/showtimes}" th:object="${showtime}" method="post">
                        <div class="modal-body">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="movieId" class="form-label">Movie</label>
                                    <select class="form-select" id="movieId" name="movieId" required>
                                        <option value="">Select Movie</option>
                                        <option th:each="movie : ${movies}" 
                                                th:value="${movie.id}" 
                                                th:text="${movie.title}">
                                        </option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="theaterId" class="form-label">Theater</label>
                                    <select class="form-select" id="theaterId" name="theaterId" required>
                                        <option value="">Select Theater</option>
                                        <option th:each="theater : ${theaters}" 
                                                th:value="${theater.id}" 
                                                th:text="${theater.name}">
                                        </option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="screenNumber" class="form-label">Screen Number</label>
                                    <input type="number" class="form-control" id="screenNumber" th:field="*{screenNumber}" min="1" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="showDateTime" class="form-label">Show Date & Time</label>
                                    <input type="datetime-local" class="form-control" id="showDateTime" th:field="*{showDateTime}" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="ticketPrice" class="form-label">Ticket Price (Rs.)</label>
                                    <input type="number" class="form-control" id="ticketPrice" name="ticketPrice" step="0.01" min="0" required>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="totalSeats" class="form-label">Total Seats</label>
                                <input type="number" class="form-control" id="totalSeats" name="totalSeats" min="1" required>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i>Save Showtime
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
